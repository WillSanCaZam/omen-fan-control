/var/log/hp-wmi-omen-verify.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    postrotate
        systemctl reload hp-wmi-omen-verify.service >/dev/null 2>&1 || true
    endscript
}

/var/log/hp-wmi-omen-dkms.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
}